<section id="publications" class="section section-alt">
  <div class="container section-inner">
    <h2 class="section-title">Publications and Preprints</h2>

    {% for pub in site.data.publications %}
      <!-- <article class="media-row {% if forloop.index0 | modulo:2 == 0 %}media-reverse{% endif %}"> -->
      <article class="media-row">
        <div class="media-left">
          {% if pub.video %}
            <div class="media-embed">
              <iframe src="{{ pub.video }}" allowfullscreen loading="lazy"></iframe>
            </div>
          {% else %}
            <img src="{{ pub.image | relative_url }}" alt="{{ pub.title }}">
          {% endif %}
        </div>

        <div class="media-right">
          <h3><a href="{{ pub.website_link }}" target="_blank">{{ pub.title }}</a></h3>
          <p class="meta">{{ pub.prev_authors }}<b>{{ site.name }}</b>{{ pub.after_authors }} — <em>{{ pub.venue }}</em></p>
          <p>{{ pub.description }}</p>
        </div>
      </article>
    {% endfor %}
  </div>
</section>
