<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
    <!-- favicons, meta, etc. -->
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title | default: "Your Name" }}</a></h1>
        <nav class="top-nav">
          <!-- optional: add anchor links -->
          <a href="#bio">Bio</a>
          <a href="#publications">Publications</a>
          <a href="#projects">Projects</a>
        </nav>
      </div>
    </header>

    <main>
        <section id="projects" class="section section-bio">
        <div class="container section-inner">

            {{ content }}

        </div>
        </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <small>&copy; {{ site.time | date: "%Y" }} {{ site.title | default: "Your Name" }}</small>
      </div>
    </footer>
  </body>
</html>
